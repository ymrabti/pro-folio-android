name: Deploy to Production

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+*" # Trigger on version tags

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Fastlane
        run: gem install fastlane

      - name: Decode Play Store JSON
        run: |
          mkdir -p android/fastlane/keys
          echo "${{ secrets.PLAY_STORE_JSON }}" > android/fastlane/keys/play-store-service-account.json

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run Fastlane
        run: |
          cd android
          fastlane production